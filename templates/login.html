<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITAM Evaluator — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">

    <div class="login-logo-section">
        <div class="logo-icon">🎓</div>
        <div class="logo-text">
            <h1>GITAM</h1>
            <p>Deemed to be University</p>
        </div>
    </div>

    <div class="login-card">
        {% if error %}
        <div class="login-error">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Roll Number / User ID</label>
                <input type="text" name="roll_number" placeholder="" value="" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="" required>
            </div>

            <button type="submit" class="login-btn">LOGIN</button>
        </form>

        <div class="login-links">
            <a href="#">Forgot your password?</a>
            <a href="#">Not your institution?</a>
        </div>
    </div>

    <div class="login-footer">
        ©2026 Copyright CodeTantra.com &nbsp;&nbsp; <a href="#">Terms & Privacy</a>
    </div>

</body>
</html>
